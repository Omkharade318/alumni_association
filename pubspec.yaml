name: alumni_connect
description: Alumni Connect - A mobile app for alumni networking, events, and donations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  provider: ^6.1.1
  image_picker: ^1.0.7
  table_calendar: ^3.0.9
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  cached_network_image: ^3.3.1
  uuid: ^4.2.2
  supabase_flutter: ^2.12.4
  http: ^1.2.1
  rxdart: ^0.27.7
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
